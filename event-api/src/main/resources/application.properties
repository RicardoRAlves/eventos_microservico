spring.application.name=event-api
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Rabbit Mq
spring.rabbitmq.host=${RABBIT_HOST:localhost}
spring.rabbitmq.username=${RABBIT_USERNAME:rabbitmq}
spring.rabbitmq.password=${RABBIT_PASSWORD:rabbitmq}
spring.rabbitmq.port=${RABBIT_PORT:5672}
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# RABBITMQ Create Event
rabbitmq.exchange.create.name=events.v1.create-event
rabbitmq.exchange.error.create.name=events.v1.create-error-event
rabbitmq.create.error.queue.name=events.v1.create-event-queue.error

# RABBITMQ Get Event
rabbitmq.exchange.get-all.name=events.v1.get-all-event

# RABBITMQ Get Event
rabbitmq.exchange.update.name=events.v1.update-event

# RABBITMQ Notification Event
rabbitmq.exchange.error.create.notification.name=events.v1.create-error-notification

# AWS S3
aws.access_key_id=${ACCESS_KEY_ID}
aws.secret_access_key=${SECRET_ACCESS_KEY}
s3.bucket=${S3_BUCKET}
s3.region=${S3_REGION}

# MONGO DB
# MONGO DB
spring.data.mongodb.username=${MONGO_USER:admin}
spring.data.mongodb.password=${MONGO_PASS:123456}
spring.data.mongodb.database=${MONGO_DB:admin}
spring.data.mongodb.uri=mongodb://${MONGO_USER:admin}:${MONGO_PASS:123456}@${MONGO_HOST:localhost}:27017/${MONGO_DB:admin}?authSource=admin

