spring.application.name=event-api
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# ?? RabbitMQ ?? sobrescrito pelo @DynamicPropertySource
spring.rabbitmq.host=localhost
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.port=5672
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# RABBITMQ Create Event
rabbitmq.exchange.create.name=create-event
rabbitmq.exchange.error.create.name=create-error-event
rabbitmq.create.error.queue.name=create-event-queue.error

# RABBITMQ Get Event
rabbitmq.exchange.get-all.name=get-all-event

# RABBITMQ Update Event
rabbitmq.exchange.update.name=update-event

# RABBITMQ Notification Event
rabbitmq.exchange.error.create.notification.name=create-error-notification

# ?? AWS S3 ?? valores fictícios, nenhuma chamada real é feita nos testes
aws.access_key_id=test-access-key
aws.secret_access_key=test-secret-key
s3.bucket=test-bucket
s3.region=us-east-1

# ?? MongoDB ?? sobrescrito pelo @DynamicPropertySource
spring.data.mongodb.username=admin
spring.data.mongodb.password=123456
spring.data.mongodb.database=admin
spring.data.mongodb.uri=mongodb://admin:123456@localhost:27017/admin?authSource=admin
