spring.application.name=event-api
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# SPRING DOC
springdoc.swagger-ui.path=/api-docs.html
springdoc.api-docs.path=/api-docs
springdoc.packagesToScan=com.br.capoeira.eventos.evento_api.controller

# Rabbit Mq
spring.rabbitmq.host=localhost
spring.rabbitmq.username=rabbitmq
spring.rabbitmq.password=rabbitmq
spring.rabbitmq.port=5672

# RABBITMQ Create Event
rabbitmq.exchange.create.name=events.v1.create-event
rabbitmq.exchange.get-all.name=events.v1.get-all-event
rabbitmq.exchange.error.create.name=events.v1.create-error-event
rabbitmq.exchange.error.create.notification.name=events.v1.create-error-notification
rabbitmq.exchange.update.name=events.v1.update-event
rabbitmq.create.error.queue.name=events.v1.create-event.error


# AWS S3
aws.access_key_id=${ACCESS_KEY_ID}
aws.secret_access_key=${SECRET_ACCESS_KEY}
s3.bucket=${S3_BUCKET}
s3.region=${S3_REGION}

# MONGO DB
spring.data.mongodb.uri=${MONGO_DB_URI:mongodb://admin:123456@localhost:27017}
spring.data.mongodb.database= admin
