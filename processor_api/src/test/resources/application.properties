
# RABBITMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.port=5672
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# RABBITMQ Create Event
rabbitmq.exchange.create.name=events.v1.create-event
rabbitmq.create.queue.name=events.v1.create-queue-event.save-database
rabbitmq.exchange.error.create.name=events.v1.create-error-event

# RABBITMQ Get Event
rabbitmq.exchange.get-all.name=events.v1.get-all-event
rabbitmq.get-all.queue.name=events.v1.get-all-queue-event


# RABBITMQ Update Event
rabbitmq.exchange.update.name=events.v1.update-event
rabbitmq.update.queue.name=events.v1.update-queue-event


# RABBITMQ Notification
rabbitmq.exchange.create-notification.name=events.v1.create-notification-event
rabbitmq.exchange.get-all-notification.name=events.v1.get-all-notification-event
rabbitmq.exchange.update-notification.name=events.v1.update-notification-event
rabbitmq.exchange.update-error-notification.name=events.v1.update-error-notification-event
